"openapi": "3.1.0"
"info":
  "title": "PixelPast"
  "version": "0.1.0"
"paths":
  "/api/health":
    "get":
      "tags":
        - "health"
      "summary": "Check API process health"
      "description": "Return a lightweight liveness payload for the local PixelPast API process. This endpoint does not verify connector availability or database contents."
      "operationId": "health_api_health_get"
      "responses":
        "200":
          "description": "Minimal liveness status for the running API process."
          "content":
            "application/json":
              "schema":
                "additionalProperties":
                  "type": "string"
                "type": "object"
                "title": "Response Health Api Health Get"
              "examples":
                "ok":
                  "summary": "Healthy local API process"
                  "value":
                    "status": "ok"
  "/api/exploration/bootstrap":
    "get":
      "tags":
        - "timeline"
      "summary": "Get exploration bootstrap metadata"
      "description": "Return exploration shell metadata for the resolved date range, including available view modes, known people, and tags, without the dense day grid payload."
      "operationId": "get_exploration_bootstrap_api_exploration_bootstrap_get"
      "parameters":
        -
          "name": "start"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "string"
                "format": "date"
              -
                "type": "null"
            "description": "Inclusive UTC start date for the requested exploration window. Must be provided together with end."
            "title": "Start"
          "description": "Inclusive UTC start date for the requested exploration window. Must be provided together with end."
          "examples":
            "winter_window":
              "summary": "Window start for January 2026"
              "value": "2026-01-01"
        -
          "name": "end"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "string"
                "format": "date"
              -
                "type": "null"
            "description": "Inclusive UTC end date for the requested exploration window. Must be provided together with start."
            "title": "End"
          "description": "Inclusive UTC end date for the requested exploration window. Must be provided together with start."
          "examples":
            "winter_window":
              "summary": "Window end for January 2026"
              "value": "2026-01-31"
      "responses":
        "200":
          "description": "Exploration shell metadata for the resolved inclusive UTC date range."
          "content":
            "application/json":
              "schema":
                "$ref": "#/components/schemas/ExplorationBootstrapResponse"
              "examples":
                "winter_overview":
                  "summary": "Bootstrap metadata for a winter exploration window"
                  "value":
                    "range":
                      "start": "2026-01-01"
                      "end": "2026-01-31"
                    "view_modes":
                      -
                        "id": "activity"
                        "label": "Activity"
                        "description": "Overall day activity score across all imported sources."
                      -
                        "id": "workdays_vacation"
                        "label": "Vacation"
                        "description": "Workday and vacation classification for each calendar day."
                    "persons":
                      -
                        "id": 7
                        "name": "Anna Becker"
                        "role": "family"
                      -
                        "id": 12
                        "name": "Milo Tan"
                        "role": "friend"
                    "tags":
                      -
                        "path": "travel/italy/venice"
                        "label": "Venice"
                      -
                        "path": "music/concert/live"
                        "label": "Live Concert"
        "400":
          "description": "The request was syntactically valid but violated a documented PixelPast API contract constraint."
          "content":
            "application/json":
              "examples":
                "invalid_range":
                  "summary": "Start date after end date"
                  "value":
                    "detail": "start must be less than or equal to end"
                "partial_range":
                  "summary": "Only one range boundary provided"
                  "value":
                    "detail": "start and end must both be provided together"
              "schema":
                "$ref": "#/components/schemas/ApiErrorResponse"
        "422":
          "description": "The request could not be parsed or failed declared parameter validation."
          "content":
            "application/json":
              "examples":
                "invalid_date":
                  "summary": "Unparseable ISO date"
                  "value":
                    "detail":
                      -
                        "type": "date_from_datetime_parsing"
                        "loc":
                          - "query"
                          - "start"
                        "msg": "Input should be a valid date or datetime, input is too short"
                        "input": "2026-02"
                "invalid_path_date":
                  "summary": "Invalid path day format"
                  "value":
                    "detail":
                      -
                        "type": "date_from_datetime_parsing"
                        "loc":
                          - "path"
                          - "day"
                        "msg": "Input should be a valid date or datetime, invalid date separator"
                        "input": "2026/07/14"
              "schema":
                "$ref": "#/components/schemas/ApiValidationErrorResponse"
  "/api/exploration":
    "get":
      "tags":
        - "timeline"
      "summary": "Get exploration day grid"
      "description": "Return the dense exploration day grid for the resolved inclusive UTC date range. Optional server-side filters constrain which canonical items contribute to each day."
      "operationId": "get_exploration_api_exploration_get"
      "parameters":
        -
          "name": "start"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "string"
                "format": "date"
              -
                "type": "null"
            "description": "Inclusive UTC start date for the requested exploration window. Must be provided together with end."
            "title": "Start"
          "description": "Inclusive UTC start date for the requested exploration window. Must be provided together with end."
          "examples":
            "trip_window_start":
              "summary": "Trip window start"
              "value": "2026-07-01"
        -
          "name": "end"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "string"
                "format": "date"
              -
                "type": "null"
            "description": "Inclusive UTC end date for the requested exploration window. Must be provided together with start."
            "title": "End"
          "description": "Inclusive UTC end date for the requested exploration window. Must be provided together with start."
          "examples":
            "trip_window_end":
              "summary": "Trip window end"
              "value": "2026-07-07"
        -
          "name": "view_mode"
          "in": "query"
          "required": false
          "schema":
            "type": "string"
            "description": "Backend-defined daily view identifier that determines which derived day rows are projected into the grid."
            "default": "activity"
            "title": "View Mode"
          "description": "Backend-defined daily view identifier that determines which derived day rows are projected into the grid."
          "examples":
            "travel_view":
              "summary": "Default activity projection"
              "value": "activity"
        -
          "name": "person_ids"
          "in": "query"
          "required": false
          "schema":
            "type": "array"
            "items":
              "type": "integer"
            "description": "Repeatable person identifiers. Only canonical items linked to at least one selected person contribute to counts."
            "default": []
            "title": "Person Ids"
          "description": "Repeatable person identifiers. Only canonical items linked to at least one selected person contribute to counts."
          "examples":
            "anna":
              "summary": "Filter to Anna Becker"
              "value": 7
        -
          "name": "tag_paths"
          "in": "query"
          "required": false
          "schema":
            "type": "array"
            "items":
              "type": "string"
            "description": "Repeatable normalized tag paths used to restrict contributing canonical items."
            "default": []
            "title": "Tag Paths"
          "description": "Repeatable normalized tag paths used to restrict contributing canonical items."
          "examples":
            "venice":
              "summary": "Filter to a travel tag subtree"
              "value": "travel/italy/venice"
        -
          "name": "location_geometry"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "string"
              -
                "type": "null"
            "description": "Optional serialized geometry filter interpreted by the active projection provider."
            "title": "Location Geometry"
          "description": "Optional serialized geometry filter interpreted by the active projection provider."
          "examples":
            "venice_bbox":
              "summary": "Serialized geometry understood by the active provider"
              "value": "bbox:12.285,45.423,12.380,45.465"
        -
          "name": "distance_latitude"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "number"
                "maximum": 90
                "minimum": -90
              -
                "type": "null"
            "description": "Latitude for a radial distance filter. Use together with distance_longitude and distance_radius_meters."
            "title": "Distance Latitude"
          "description": "Latitude for a radial distance filter. Use together with distance_longitude and distance_radius_meters."
          "examples":
            "venice_center":
              "summary": "Latitude for a nearby-place filter"
              "value": 45.4371
        -
          "name": "distance_longitude"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "number"
                "maximum": 180
                "minimum": -180
              -
                "type": "null"
            "description": "Longitude for a radial distance filter. Use together with distance_latitude and distance_radius_meters."
            "title": "Distance Longitude"
          "description": "Longitude for a radial distance filter. Use together with distance_latitude and distance_radius_meters."
          "examples":
            "venice_center":
              "summary": "Longitude for a nearby-place filter"
              "value": 12.3327
        -
          "name": "distance_radius_meters"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "integer"
                "minimum": 1
              -
                "type": "null"
            "description": "Radius in meters for the radial distance filter."
            "title": "Distance Radius Meters"
          "description": "Radius in meters for the radial distance filter."
          "examples":
            "walkable_radius":
              "summary": "Five kilometer radial filter"
              "value": 5000
        -
          "name": "filename_query"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "string"
                "minLength": 1
              -
                "type": "null"
            "description": "Case-insensitive filename search term applied to contributing assets."
            "title": "Filename Query"
          "description": "Case-insensitive filename search term applied to contributing assets."
          "examples":
            "camera_roll":
              "summary": "Filename substring match"
              "value": "IMG_20260703"
      "responses":
        "200":
          "description": "Dense exploration grid for the resolved UTC date range."
          "content":
            "application/json":
              "schema":
                "$ref": "#/components/schemas/ExplorationGridResponse"
              "examples":
                "filtered_travel_grid":
                  "summary": "Day grid filtered to one person and a travel tag"
                  "value":
                    "range":
                      "start": "2026-07-01"
                      "end": "2026-07-07"
                    "days":
                      -
                        "date": "2026-07-01"
                        "count": 0
                        "color": "empty"
                      -
                        "date": "2026-07-02"
                        "count": 3
                        "color": "medium"
                        "label": "Venice arrival and evening walk"
                      -
                        "date": "2026-07-03"
                        "count": 6
                        "color": "#E07A5F"
                        "label": "Biennale and canal photos"
        "400":
          "description": "The request was syntactically valid but violated a documented PixelPast API contract constraint."
          "content":
            "application/json":
              "examples":
                "invalid_range":
                  "summary": "Start date after end date"
                  "value":
                    "detail": "start must be less than or equal to end"
                "partial_range":
                  "summary": "Only one range boundary provided"
                  "value":
                    "detail": "start and end must both be provided together"
              "schema":
                "$ref": "#/components/schemas/ApiErrorResponse"
        "422":
          "description": "The request could not be parsed or failed declared parameter validation."
          "content":
            "application/json":
              "examples":
                "invalid_date":
                  "summary": "Unparseable ISO date"
                  "value":
                    "detail":
                      -
                        "type": "date_from_datetime_parsing"
                        "loc":
                          - "query"
                          - "start"
                        "msg": "Input should be a valid date or datetime, input is too short"
                        "input": "2026-02"
                "invalid_path_date":
                  "summary": "Invalid path day format"
                  "value":
                    "detail":
                      -
                        "type": "date_from_datetime_parsing"
                        "loc":
                          - "path"
                          - "day"
                        "msg": "Input should be a valid date or datetime, invalid date separator"
                        "input": "2026/07/14"
              "schema":
                "$ref": "#/components/schemas/ApiValidationErrorResponse"
