"openapi": "3.1.0"
"info":
  "title": "PixelPast"
  "version": "0.1.0"
"paths":
  "/api/health":
    "get":
      "tags":
        - "health"
      "summary": "Check API process health"
      "description": "Return a lightweight liveness payload for the local PixelPast API process. This endpoint does not verify connector availability or database contents."
      "operationId": "health_api_health_get"
      "responses":
        "200":
          "description": "Minimal liveness status for the running API process."
          "content":
            "application/json":
              "schema":
                "additionalProperties":
                  "type": "string"
                "type": "object"
                "title": "Response Health Api Health Get"
              "examples":
                "ok":
                  "summary": "Healthy local API process"
                  "value":
                    "status": "ok"
  "/api/exploration/bootstrap":
    "get":
      "tags":
        - "timeline"
      "summary": "Get exploration bootstrap metadata"
      "description": "Return exploration shell metadata for the resolved date range, including available view modes, known people, and tags, without the dense day grid payload."
      "operationId": "get_exploration_bootstrap_api_exploration_bootstrap_get"
      "parameters":
        -
          "name": "start"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "string"
                "format": "date"
              -
                "type": "null"
            "description": "Inclusive UTC start date for the requested exploration window. Must be provided together with end."
            "title": "Start"
          "description": "Inclusive UTC start date for the requested exploration window. Must be provided together with end."
          "examples":
            "winter_window":
              "summary": "Window start for January 2026"
              "value": "2026-01-01"
        -
          "name": "end"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "string"
                "format": "date"
              -
                "type": "null"
            "description": "Inclusive UTC end date for the requested exploration window. Must be provided together with start."
            "title": "End"
          "description": "Inclusive UTC end date for the requested exploration window. Must be provided together with start."
          "examples":
            "winter_window":
              "summary": "Window end for January 2026"
              "value": "2026-01-31"
      "responses":
        "200":
          "description": "Exploration shell metadata for the resolved inclusive UTC date range."
          "content":
            "application/json":
              "schema":
                "$ref": "#/components/schemas/ExplorationBootstrapResponse"
              "examples":
                "winter_overview":
                  "summary": "Bootstrap metadata for a winter exploration window"
                  "value":
                    "range":
                      "start": "2026-01-01"
                      "end": "2026-01-31"
                    "view_modes":
                      -
                        "id": "activity"
                        "label": "Activity"
                        "description": "Overall day activity score across all imported sources."
                      -
                        "id": "workdays_vacation"
                        "label": "Vacation"
                        "description": "Workday and vacation classification for each calendar day."
                    "persons":
                      -
                        "id": 7
                        "name": "Anna Becker"
                        "role": "family"
                      -
                        "id": 12
                        "name": "Milo Tan"
                        "role": "friend"
                    "tags":
                      -
                        "path": "travel/italy/venice"
                        "label": "Venice"
                      -
                        "path": "music/concert/live"
                        "label": "Live Concert"
        "400":
          "description": "The request was syntactically valid but violated a documented PixelPast API contract constraint."
          "content":
            "application/json":
              "examples":
                "invalid_range":
                  "summary": "Start date after end date"
                  "value":
                    "detail": "start must be less than or equal to end"
                "partial_range":
                  "summary": "Only one range boundary provided"
                  "value":
                    "detail": "start and end must both be provided together"
              "schema":
                "$ref": "#/components/schemas/ApiErrorResponse"
        "422":
          "description": "The request could not be parsed or failed declared parameter validation."
          "content":
            "application/json":
              "examples":
                "invalid_date":
                  "summary": "Unparseable ISO date"
                  "value":
                    "detail":
                      -
                        "type": "date_from_datetime_parsing"
                        "loc":
                          - "query"
                          - "start"
                        "msg": "Input should be a valid date or datetime, input is too short"
                        "input": "2026-02"
                "invalid_path_date":
                  "summary": "Invalid path day format"
                  "value":
                    "detail":
                      -
                        "type": "date_from_datetime_parsing"
                        "loc":
                          - "path"
                          - "day"
                        "msg": "Input should be a valid date or datetime, invalid date separator"
                        "input": "2026/07/14"
              "schema":
                "$ref": "#/components/schemas/ApiValidationErrorResponse"
  "/api/albums/folders":
    "get":
