"openapi": "3.1.0"
"info":
  "title": "PixelPast"
  "version": "0.1.0"
"paths":
  "/api/health":
    "get":
      "tags":
        - "health"
      "summary": "Check API process health"
      "description": "Return a lightweight liveness payload for the local PixelPast API process. This endpoint does not verify connector availability or database contents."
      "operationId": "health_api_health_get"
      "responses":
        "200":
          "description": "Minimal liveness status for the running API process."
          "content":
            "application/json":
              "schema":
                "additionalProperties":
                  "type": "string"
                "type": "object"
                "title": "Response Health Api Health Get"
  "/api/exploration/bootstrap":
    "get":
      "tags":
        - "timeline"
      "summary": "Get exploration bootstrap metadata"
      "description": "Return exploration shell metadata for the resolved date range, including available view modes, known people, and tags, without the dense day grid payload."
      "operationId": "get_exploration_bootstrap_api_exploration_bootstrap_get"
      "parameters":
        -
          "name": "start"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "string"
                "format": "date"
              -
                "type": "null"
            "description": "Inclusive UTC start date for the requested exploration window. Must be provided together with end."
            "title": "Start"
          "description": "Inclusive UTC start date for the requested exploration window. Must be provided together with end."
        -
          "name": "end"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "string"
                "format": "date"
              -
                "type": "null"
            "description": "Inclusive UTC end date for the requested exploration window. Must be provided together with start."
            "title": "End"
          "description": "Inclusive UTC end date for the requested exploration window. Must be provided together with start."
      "responses":
        "200":
          "description": "Exploration shell metadata for the resolved inclusive UTC date range."
          "content":
            "application/json":
              "schema":
                "$ref": "#/components/schemas/ExplorationBootstrapResponse"
        "400":
          "description": "The request was syntactically valid but violated a documented PixelPast API contract constraint."
          "content":
            "application/json":
              "schema":
                "$ref": "#/components/schemas/ApiErrorResponse"
        "422":
          "description": "The request could not be parsed or failed declared parameter validation."
          "content":
            "application/json":
              "schema":
                "$ref": "#/components/schemas/ApiValidationErrorResponse"
  "/api/exploration":
    "get":
      "tags":
        - "timeline"
      "summary": "Get exploration day grid"
      "description": "Return the dense exploration day grid for the resolved inclusive UTC date range. Optional server-side filters constrain which canonical items contribute to each day."
      "operationId": "get_exploration_api_exploration_get"
      "parameters":
        -
          "name": "start"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "string"
                "format": "date"
              -
                "type": "null"
            "description": "Inclusive UTC start date for the requested exploration window. Must be provided together with end."
            "title": "Start"
          "description": "Inclusive UTC start date for the requested exploration window. Must be provided together with end."
        -
          "name": "end"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "string"
                "format": "date"
              -
                "type": "null"
            "description": "Inclusive UTC end date for the requested exploration window. Must be provided together with start."
            "title": "End"
          "description": "Inclusive UTC end date for the requested exploration window. Must be provided together with start."
        -
          "name": "view_mode"
          "in": "query"
          "required": false
          "schema":
            "type": "string"
            "description": "Backend-defined daily view identifier that determines which derived day rows are projected into the grid."
            "default": "activity"
            "title": "View Mode"
          "description": "Backend-defined daily view identifier that determines which derived day rows are projected into the grid."
        -
          "name": "person_ids"
          "in": "query"
          "required": false
          "schema":
            "type": "array"
            "items":
              "type": "integer"
            "description": "Repeatable person identifiers. Only canonical items linked to at least one selected person contribute to counts."
            "default": []
            "title": "Person Ids"
          "description": "Repeatable person identifiers. Only canonical items linked to at least one selected person contribute to counts."
        -
          "name": "tag_paths"
          "in": "query"
          "required": false
          "schema":
            "type": "array"
            "items":
              "type": "string"
            "description": "Repeatable normalized tag paths used to restrict contributing canonical items."
            "default": []
            "title": "Tag Paths"
          "description": "Repeatable normalized tag paths used to restrict contributing canonical items."
        -
          "name": "location_geometry"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "string"
              -
                "type": "null"
            "description": "Optional serialized geometry filter interpreted by the active projection provider."
            "title": "Location Geometry"
          "description": "Optional serialized geometry filter interpreted by the active projection provider."
        -
          "name": "distance_latitude"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "number"
                "maximum": 90
                "minimum": -90
              -
                "type": "null"
            "description": "Latitude for a radial distance filter. Use together with distance_longitude and distance_radius_meters."
            "title": "Distance Latitude"
          "description": "Latitude for a radial distance filter. Use together with distance_longitude and distance_radius_meters."
        -
          "name": "distance_longitude"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "number"
                "maximum": 180
                "minimum": -180
              -
                "type": "null"
            "description": "Longitude for a radial distance filter. Use together with distance_latitude and distance_radius_meters."
            "title": "Distance Longitude"
          "description": "Longitude for a radial distance filter. Use together with distance_latitude and distance_radius_meters."
        -
          "name": "distance_radius_meters"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "integer"
                "minimum": 1
              -
                "type": "null"
            "description": "Radius in meters for the radial distance filter."
            "title": "Distance Radius Meters"
          "description": "Radius in meters for the radial distance filter."
        -
          "name": "filename_query"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "string"
                "minLength": 1
              -
                "type": "null"
            "description": "Case-insensitive filename search term applied to contributing assets."
            "title": "Filename Query"
          "description": "Case-insensitive filename search term applied to contributing assets."
      "responses":
        "200":
          "description": "Dense exploration grid for the resolved UTC date range."
          "content":
            "application/json":
              "schema":
                "$ref": "#/components/schemas/ExplorationGridResponse"
        "400":
          "description": "The request was syntactically valid but violated a documented PixelPast API contract constraint."
          "content":
            "application/json":
              "schema":
                "$ref": "#/components/schemas/ApiErrorResponse"
        "422":
          "description": "The request could not be parsed or failed declared parameter validation."
          "content":
            "application/json":
              "schema":
                "$ref": "#/components/schemas/ApiValidationErrorResponse"
  "/api/days/context":
    "get":
      "tags":
        - "timeline"
      "summary": "Get day context preload"
      "description": "Return per-day context panels for an inclusive UTC range so the UI can preload hover data, tags, people, map points, and summary counts."
      "operationId": "get_day_context_api_days_context_get"
      "parameters":
        -
          "name": "start"
          "in": "query"
          "required": true
          "schema":
            "type": "string"
            "format": "date"
            "description": "Inclusive UTC start date for the requested context preload."
            "title": "Start"
          "description": "Inclusive UTC start date for the requested context preload."
        -
          "name": "end"
          "in": "query"
          "required": true
          "schema":
            "type": "string"
            "format": "date"
            "description": "Inclusive UTC end date for the requested context preload."
            "title": "End"
          "description": "Inclusive UTC end date for the requested context preload."
        -
          "name": "view_mode"
          "in": "query"
          "required": false
          "schema":
            "type": "string"
            "description": "Backend-defined daily view identifier that determines which derived day rows provide the context payload."
            "default": "activity"
            "title": "View Mode"
          "description": "Backend-defined daily view identifier that determines which derived day rows provide the context payload."
        -
          "name": "person_ids"
          "in": "query"
          "required": false
          "schema":
            "type": "array"
            "items":
              "type": "integer"
            "description": "Repeatable person identifiers used to filter contributing canonical items."
            "default": []
            "title": "Person Ids"
          "description": "Repeatable person identifiers used to filter contributing canonical items."
        -
          "name": "tag_paths"
          "in": "query"
          "required": false
          "schema":
            "type": "array"
            "items":
              "type": "string"
            "description": "Repeatable normalized tag paths used to filter contributing canonical items."
            "default": []
            "title": "Tag Paths"
          "description": "Repeatable normalized tag paths used to filter contributing canonical items."
        -
          "name": "location_geometry"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "string"
              -
                "type": "null"
            "description": "Optional serialized geometry filter interpreted by the active projection provider."
            "title": "Location Geometry"
          "description": "Optional serialized geometry filter interpreted by the active projection provider."
        -
          "name": "distance_latitude"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "number"
                "maximum": 90
                "minimum": -90
              -
                "type": "null"
            "description": "Latitude for a radial distance filter. Use together with distance_longitude and distance_radius_meters."
            "title": "Distance Latitude"
          "description": "Latitude for a radial distance filter. Use together with distance_longitude and distance_radius_meters."
        -
          "name": "distance_longitude"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "number"
                "maximum": 180
                "minimum": -180
              -
                "type": "null"
            "description": "Longitude for a radial distance filter. Use together with distance_latitude and distance_radius_meters."
            "title": "Distance Longitude"
          "description": "Longitude for a radial distance filter. Use together with distance_latitude and distance_radius_meters."
        -
          "name": "distance_radius_meters"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "integer"
                "minimum": 1
              -
                "type": "null"
            "description": "Radius in meters for the radial distance filter."
            "title": "Distance Radius Meters"
          "description": "Radius in meters for the radial distance filter."
        -
          "name": "filename_query"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "string"
                "minLength": 1
              -
                "type": "null"
            "description": "Case-insensitive filename search term applied to contributing assets."
            "title": "Filename Query"
          "description": "Case-insensitive filename search term applied to contributing assets."
      "responses":
        "200":
          "description": "Dense day-context payload for the requested UTC range."
          "content":
            "application/json":
              "schema":
                "$ref": "#/components/schemas/DayContextResponse"
        "400":
          "description": "The request was syntactically valid but violated a documented PixelPast API contract constraint."
          "content":
            "application/json":
              "schema":
                "$ref": "#/components/schemas/ApiErrorResponse"
        "422":
          "description": "The request could not be parsed or failed declared parameter validation."
          "content":
            "application/json":
              "schema":
                "$ref": "#/components/schemas/ApiValidationErrorResponse"
  "/api/days/{day}":
    "get":
      "tags":
        - "timeline"
      "summary": "Get one day timeline"
      "description": "Return the unified canonical event and asset timeline for a single UTC calendar day, ordered by timestamp."
      "operationId": "get_day_detail_api_days__day__get"
      "parameters":
        -
          "name": "day"
          "in": "path"
          "required": true
          "schema":
            "type": "string"
            "format": "date"
            "description": "UTC calendar day to inspect in ISO format (YYYY-MM-DD)."
            "title": "Day"
          "description": "UTC calendar day to inspect in ISO format (YYYY-MM-DD)."
      "responses":
        "200":
          "description": "Chronological event and asset items for one UTC day."
          "content":
            "application/json":
              "schema":
                "$ref": "#/components/schemas/DayDetailResponse"
        "422":
          "description": "The request could not be parsed or failed declared parameter validation."
          "content":
            "application/json":
              "schema":
                "$ref": "#/components/schemas/ApiValidationErrorResponse"
  "/api/social/graph":
    "get":
      "tags":
        - "social"
      "summary": "Get social graph projection"
      "description": "Return a person co-occurrence graph derived from qualifying assets within the resolved inclusive UTC date range."
      "operationId": "get_social_graph_api_social_graph_get"
      "parameters":
        -
          "name": "start"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "string"
                "format": "date"
              -
                "type": "null"
            "description": "Inclusive UTC start date for the requested social-graph window. Must be provided together with end."
            "title": "Start"
          "description": "Inclusive UTC start date for the requested social-graph window. Must be provided together with end."
        -
          "name": "end"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "string"
                "format": "date"
              -
                "type": "null"
            "description": "Inclusive UTC end date for the requested social-graph window. Must be provided together with start."
            "title": "End"
          "description": "Inclusive UTC end date for the requested social-graph window. Must be provided together with start."
        -
          "name": "person_ids"
          "in": "query"
          "required": false
          "schema":
            "type": "array"
            "items":
              "type": "integer"
            "description": "Repeatable seed person identifiers. Only assets containing at least one selected person qualify when this filter is present."
            "default": []
            "title": "Person Ids"
          "description": "Repeatable seed person identifiers. Only assets containing at least one selected person qualify when this filter is present."
        -
          "name": "max_people_per_asset"
          "in": "query"
          "required": false
          "schema":
            "type": "integer"
            "maximum": 30
            "minimum": 2
            "description": "Ignore assets that contain more than this many linked people to avoid oversized group shots dominating the graph."
            "default": 10
            "title": "Max People Per Asset"
          "description": "Ignore assets that contain more than this many linked people to avoid oversized group shots dominating the graph."
        -
          "name": "tag_paths"
          "in": "query"
          "required": false
          "schema":
            "type": "array"
            "items":
              "type": "string"
            "description": "Reserved filter parameter. The current social graph contract rejects tag-based filtering."
            "default": []
            "title": "Tag Paths"
          "description": "Reserved filter parameter. The current social graph contract rejects tag-based filtering."
        -
          "name": "location_geometry"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "string"
              -
                "type": "null"
            "description": "Reserved filter parameter. The current social graph contract rejects geometry-based filtering."
            "title": "Location Geometry"
          "description": "Reserved filter parameter. The current social graph contract rejects geometry-based filtering."
        -
          "name": "distance_latitude"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "number"
                "maximum": 90
                "minimum": -90
              -
                "type": "null"
            "description": "Reserved filter parameter. The current social graph contract rejects radial distance filtering."
            "title": "Distance Latitude"
          "description": "Reserved filter parameter. The current social graph contract rejects radial distance filtering."
        -
          "name": "distance_longitude"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "number"
                "maximum": 180
                "minimum": -180
              -
                "type": "null"
            "description": "Reserved filter parameter. The current social graph contract rejects radial distance filtering."
            "title": "Distance Longitude"
          "description": "Reserved filter parameter. The current social graph contract rejects radial distance filtering."
        -
          "name": "distance_radius_meters"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "integer"
                "minimum": 1
              -
                "type": "null"
            "description": "Reserved filter parameter. The current social graph contract rejects radial distance filtering."
            "title": "Distance Radius Meters"
          "description": "Reserved filter parameter. The current social graph contract rejects radial distance filtering."
        -
          "name": "filename_query"
          "in": "query"
          "required": false
          "schema":
            "anyOf":
              -
                "type": "string"
                "minLength": 1
              -
                "type": "null"
            "description": "Reserved filter parameter. The current social graph contract rejects filename-based filtering."
            "title": "Filename Query"
          "description": "Reserved filter parameter. The current social graph contract rejects filename-based filtering."
      "responses":
        "200":
          "description": "Person nodes and weighted links for the filtered social graph."
          "content":
            "application/json":
              "schema":
                "$ref": "#/components/schemas/SocialGraphResponse"
        "400":
          "description": "The request was syntactically valid but violated a documented PixelPast API contract constraint."
          "content":
            "application/json":
              "schema":
                "$ref": "#/components/schemas/ApiErrorResponse"
        "422":
          "description": "The request could not be parsed or failed declared parameter validation."
          "content":
            "application/json":
              "schema":
                "$ref": "#/components/schemas/ApiValidationErrorResponse"
"components":
  "schemas":
    "ApiErrorResponse":
      "properties":
        "detail":
          "type": "string"
          "title": "Detail"
      "type": "object"
      "required":
        - "detail"
      "title": "ApiErrorResponse"
      "description": "Error payload for contract-level request rejections."
    "ApiValidationErrorItem":
      "properties":
        "type":
          "type": "string"
          "title": "Type"
        "loc":
          "items":
            "anyOf":
              -
                "type": "string"
              -
                "type": "integer"
          "type": "array"
          "title": "Loc"
        "msg":
          "type": "string"
          "title": "Msg"
        "input":
          "anyOf":
            - {}
            -
              "type": "null"
          "title": "Input"
      "type": "object"
      "required":
        - "type"
        - "loc"
        - "msg"
      "title": "ApiValidationErrorItem"
      "description": "One FastAPI request validation error entry."
    "ApiValidationErrorResponse":
      "properties":
        "detail":
          "items":
            "$ref": "#/components/schemas/ApiValidationErrorItem"
          "type": "array"
          "title": "Detail"
      "type": "object"
      "required":
        - "detail"
      "title": "ApiValidationErrorResponse"
      "description": "Error payload returned when declared request validation fails."
    "DayAssetItem":
      "properties":
        "item_type":
          "type": "string"
          "const": "asset"
          "title": "Item Type"
        "id":
          "type": "integer"
          "title": "Id"
        "timestamp":
          "type": "string"
          "format": "date-time"
          "title": "Timestamp"
        "media_type":
          "type": "string"
          "title": "Media Type"
        "external_id":
          "type": "string"
          "title": "External Id"
      "type": "object"
      "required":
        - "item_type"
        - "id"
        - "timestamp"
        - "media_type"
        - "external_id"
      "title": "DayAssetItem"
      "description": "Serialized day-detail item for a canonical asset."
    "DayContextDay":
      "properties":
        "date":
          "type": "string"
          "format": "date"
          "title": "Date"
        "persons":
          "items":
            "$ref": "#/components/schemas/ExplorationPerson"
          "type": "array"
          "title": "Persons"
        "tags":
          "items":
            "$ref": "#/components/schemas/ExplorationTag"
          "type": "array"
          "title": "Tags"
        "map_points":
          "items":
            "$ref": "#/components/schemas/DayContextMapPoint"
          "type": "array"
          "title": "Map Points"
        "summary_counts":
          "$ref": "#/components/schemas/DayContextSummaryCounts"
      "type": "object"
      "required":
        - "date"
        - "persons"
        - "tags"
        - "map_points"
        - "summary_counts"
      "title": "DayContextDay"
      "description": "Dense hover-context payload for one UTC calendar day."
    "DayContextMapPoint":
      "properties":
        "id":
          "type": "string"
          "title": "Id"
        "label":
          "type": "string"
          "title": "Label"
        "latitude":
          "type": "number"
          "title": "Latitude"
        "longitude":
          "type": "number"
          "title": "Longitude"
      "type": "object"
      "required":
        - "id"
        - "label"
        - "latitude"
        - "longitude"
      "title": "DayContextMapPoint"
      "description": "Serialized real-world map point for one UTC day."
    "DayContextResponse":
      "properties":
        "range":
          "$ref": "#/components/schemas/ExplorationRange"
        "days":
          "items":
            "$ref": "#/components/schemas/DayContextDay"
          "type": "array"
          "title": "Days"
      "type": "object"
      "required":
        - "range"
        - "days"
      "title": "DayContextResponse"
      "description": "Serialized response for an inclusive day-context preload range."
    "DayContextSummaryCounts":
      "properties":
        "events":
          "type": "integer"
          "title": "Events"
        "assets":
          "type": "integer"
          "title": "Assets"
        "places":
          "type": "integer"
          "title": "Places"
      "type": "object"
      "required":
        - "events"
        - "assets"
        - "places"
      "title": "DayContextSummaryCounts"
      "description": "Lightweight per-day counts for hover context panels."
    "DayDetailResponse":
      "properties":
        "date":
          "type": "string"
          "format": "date"
          "title": "Date"
        "items":
          "items":
            "oneOf":
              -
                "$ref": "#/components/schemas/DayEventItem"
              -
                "$ref": "#/components/schemas/DayAssetItem"
            "discriminator":
              "propertyName": "item_type"
              "mapping":
                "asset": "#/components/schemas/DayAssetItem"
                "event": "#/components/schemas/DayEventItem"
          "type": "array"
          "title": "Items"
      "type": "object"
      "required":
        - "date"
        - "items"
      "title": "DayDetailResponse"
      "description": "Serialized response for a single UTC calendar day."
    "DayEventItem":
      "properties":
        "item_type":
          "type": "string"
          "const": "event"
          "title": "Item Type"
        "id":
          "type": "integer"
          "title": "Id"
        "timestamp":
          "type": "string"
          "format": "date-time"
          "title": "Timestamp"
        "event_type":
          "type": "string"
          "title": "Event Type"
        "title":
          "type": "string"
          "title": "Title"
        "summary":
          "anyOf":
            -
              "type": "string"
            -
              "type": "null"
          "title": "Summary"
      "type": "object"
      "required":
        - "item_type"
        - "id"
        - "timestamp"
        - "event_type"
        - "title"
        - "summary"
      "title": "DayEventItem"
      "description": "Serialized day-detail item for a canonical event."
    "ExplorationBootstrapResponse":
      "properties":
        "range":
          "$ref": "#/components/schemas/ExplorationRange"
        "view_modes":
          "items":
            "$ref": "#/components/schemas/ExplorationViewMode"
          "type": "array"
          "title": "View Modes"
        "persons":
          "items":
            "$ref": "#/components/schemas/ExplorationPerson"
          "type": "array"
          "title": "Persons"
        "tags":
          "items":
            "$ref": "#/components/schemas/ExplorationTag"
          "type": "array"
          "title": "Tags"
      "type": "object"
      "required":
