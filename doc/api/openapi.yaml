  "/media/h120/{short_id}.webp":
    "get":
      "tags":
        - "media"
      "summary": "Get h120 WebP thumbnail"
      "description": "Return the fixed `h120` WebP thumbnail for one asset short id. Existing thumbnail files are served directly from the configured thumbnail root without a canonical database lookup. On cache miss, the API resolves the asset by short id and lazily generates the missing rendition."
      "operationId": "get_h120_thumbnail_media_h120__short_id__webp_get"
      "parameters":
        -
          "name": "short_id"
          "in": "path"
          "required": true
          "schema":
            "type": "string"
            "title": "Short Id"
      "responses":
        "200":
          "description": "Fixed WebP thumbnail for the requested asset short id."
          "content":
            "image/webp":
              "examples":
                "cached_h120":
                  "summary": "Cached fixed-height thumbnail hit"
                  "value": "<<binary image/webp body>>"
        "404":
          "description": "No matching asset exists for the short id, or the original file required for lazy generation is missing."
          "content":
            "application/json":
              "examples":
                "unknown_short_id":
                  "summary": "Unknown asset short id"
                  "value":
                    "detail": "asset short id 'MISS0001' does not exist"
                "missing_original":
                  "summary": "Original file missing during lazy generation"
                  "value":
                    "detail": "original file for asset 'PHOTO001' is missing"
              "schema":
                "$ref": "#/components/schemas/ApiErrorResponse"
        "415":
          "description": "The resolved asset does not support image-thumbnail generation or its source image cannot be rendered."
          "content":
            "application/json":
              "examples":
                "unsupported_asset":
                  "summary": "Asset cannot produce an image thumbnail"
                  "value":
                    "detail": "asset 'TRACK001' does not support image thumbnails"
                "render_failed":
                  "summary": "Stored source cannot be rendered as an image"
                  "value":
                    "detail": "asset 'BROKEN01' could not be rendered as a thumbnail"
              "schema":
                "$ref": "#/components/schemas/ApiErrorResponse"
        "422":
          "description": "Validation Error"
          "content":
            "application/json":
              "schema":
                "$ref": "#/components/schemas/HTTPValidationError"
