      "responses":
        "200":
          "description": "Person nodes and weighted links for the filtered social graph."
          "content":
            "application/json":
              "schema":
                "$ref": "#/components/schemas/SocialGraphResponse"
              "examples":
                "trip_companions":
                  "summary": "Social graph for a filtered travel window"
                  "value":
                    "persons":
                      -
                        "id": 7
                        "name": "Anna Becker"
                        "occurrence_count": 12
                      -
                        "id": 12
                        "name": "Milo Tan"
                        "occurrence_count": 8
                      -
                        "id": 19
                        "name": "Nora Rossi"
                        "occurrence_count": 5
                    "links":
                      -
                        "person_ids":
                          - 7
                          - 12
                        "weight": 6
                        "affinity": 0.75
                      -
                        "person_ids":
                          - 7
                          - 19
                        "weight": 3
                        "affinity": 0.428571
        "400":
          "description": "The request was syntactically valid but violated a documented PixelPast API contract constraint."
          "content":
            "application/json":
              "examples":
                "invalid_range":
                  "summary": "Start date after end date"
                  "value":
                    "detail": "start must be less than or equal to end"
                "partial_range":
                  "summary": "Only one range boundary provided"
                  "value":
                    "detail": "start and end must both be provided together"
                "unsupported_filters":
                  "summary": "Rejected tag and filename filters"
                  "value":
                    "detail": "unsupported social graph filters: filename_query, tag_paths; supported filters: start, end, person_ids, max_people_per_asset"
              "schema":
                "$ref": "#/components/schemas/ApiErrorResponse"
        "422":
          "description": "The request could not be parsed or failed declared parameter validation."
          "content":
            "application/json":
              "examples":
                "invalid_date":
                  "summary": "Unparseable ISO date"
                  "value":
                    "detail":
                      -
                        "type": "date_from_datetime_parsing"
                        "loc":
                          - "query"
                          - "start"
                        "msg": "Input should be a valid date or datetime, input is too short"
                        "input": "2026-02"
                "invalid_path_date":
                  "summary": "Invalid path day format"
                  "value":
                    "detail":
                      -
                        "type": "date_from_datetime_parsing"
                        "loc":
                          - "path"
                          - "day"
                        "msg": "Input should be a valid date or datetime, invalid date separator"
                        "input": "2026/07/14"
              "schema":
                "$ref": "#/components/schemas/ApiValidationErrorResponse"
