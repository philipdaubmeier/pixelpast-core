          "name": "person_ids"
          "in": "query"
          "required": false
          "schema":
            "type": "array"
            "items":
              "type": "integer"
            "description": "Present for cross-view filter consistency, but album tree routes reject person filtering in this increment."
            "default": []
            "title": "Person Ids"
          "description": "Present for cross-view filter consistency, but album tree routes reject person filtering in this increment."
        -
          "name": "person_group_ids"
          "in": "query"
          "required": false
          "schema":
            "type": "array"
            "items":
              "type": "integer"
            "description": "Repeatable person-group identifiers. Folder nodes remain visible only when they carry derived relevance for at least one selected group."
            "default": []
            "title": "Person Group Ids"
          "description": "Repeatable person-group identifiers. Folder nodes remain visible only when they carry derived relevance for at least one selected group."
        -
          "name": "tag_paths"
          "in": "query"
          "required": false
